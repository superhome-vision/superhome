# ── LVGL UI ──────────────────────────────────────────────────────────────────

lvgl:
  displays:
    - main_display
  touchscreens:
    - main_touchscreen
  rotation: 90
  bg_color: 0x000000

  widgets:
    - obj:
        id: root_obj
        align: TOP_LEFT
        bg_color: 0x000000
        bg_opa: COVER
        border_width: 0
        radius: 0
        width: 480
        height: 320
        pad_all: 0

        widgets:

          # Cerchio rosso — stato detection
          - obj:
              id: circle_detection
              align: CENTER
              width: 240
              height: 240
              bg_opa: TRANSP
              border_width: 10
              border_color: 0xFF0000
              radius: 120
              hidden: true

          # Arc piccolo al centro — stato pending (trigger time)
          - arc:
              id: arc_pending
              align: CENTER
              width: 100
              height: 100
              bg_opa: TRANSP
              border_width: 0
              arc_color: 0x333333
              arc_width: 8
              indicator:
                arc_color: 0xFF8800
                arc_width: 8
              min_value: 0
              max_value: 100
              value: 0
              start_angle: 270
              end_angle: 269
              adjustable: false
              hidden: true

          # Cerchio bianco — stato dimming/selecting (sfondo dell'arco)
          - obj:
              id: circle_action
              align: CENTER
              width: 240
              height: 240
              bg_opa: TRANSP
              border_width: 10
              border_color: 0x333333
              radius: 120
              hidden: true

          # Progress arc bianco in senso orario
          - arc:
              id: arc_progress
              align: CENTER
              width: 240
              height: 240
              bg_opa: TRANSP
              border_width: 0
              arc_color: 0x333333
              arc_width: 10
              indicator:
                arc_color: 0xFFFFFF
                arc_width: 10
              min_value: 0
              max_value: 100
              value: 0
              start_angle: 270
              end_angle: 269
              adjustable: false
              hidden: true

          # Logo (icona MDI) dell'entità, al centro del cerchio (detection/selection)
          - label:
              id: lbl_entity_icon
              align: CENTER
              text_font: mdi_icon
              text_color: 0xFFFFFF
              text: ""
              hidden: true

          # Nome device correntemente selezionato, sopra il cerchio
          - label:
              id: lbl_device_name
              align: TOP_MID
              y: 10
              text_font: MONTSERRAT_24
              text_color: 0xFFFFFF
              text: ""
              hidden: true

          # Numero step grande al centro
          - label:
              id: lbl_step_number
              align: CENTER
              y: 0
              text_font: MONTSERRAT_48
              text_color: 0xFFFFFF
              text: ""
              hidden: true

          # Nome step / entità sotto il cerchio (riservato per uso futuro)
          - label:
              id: lbl_step_name
              align: CENTER
              y: 100
              text_font: MONTSERRAT_24
              text_color: 0xAAAAAA
              text: ""
              hidden: true