substitutions:
  device_name: guition-35
  friendly_name: Guition 3.5

esphome:
  name: "${device_name}"
  friendly_name: "${friendly_name}"
  platformio_options:
    upload_speed: 921600
    board_build.flash_mode: dio
    board_build.f_flash: 80000000L
    board_build.f_cpu: 240000000L

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      COMPILER_OPTIMIZATION_SIZE: y
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: y
      CONFIG_ESP32S3_DATA_CACHE_64KB: y
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: y
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y

logger:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.1.123
    gateway: 192.168.1.1
    subnet: 255.255.255.0
  ap:
    ssid: "Guition Fallback"
    password: "guition35"

api:
  id: ha_api

ota:
  - platform: esphome

psram:
  mode: octal
  speed: 80MHz

globals:
  - id: current_mode
    type: std::string
    restore_value: no
    initial_value: '"waiting"'
  - id: time_step_s
    type: float
    restore_value: no
    initial_value: '3.0'
  - id: anim_start_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: last_step_val
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: pending_progress_pct
    type: int
    restore_value: no
    initial_value: '0'

time:
  - platform: homeassistant
    id: ha_time
    timezone: Europe/Rome

# ── Entity HA ────────────────────────────────────────────────────────────────

text_sensor:
  - platform: homeassistant
    id: sensor_mode
    entity_id: sensor.superhome_mode
    on_value:
      then:
        - lambda: |-
            std::string mode = x;
            id(current_mode) = mode;

            if (mode == "waiting") {
              // Schermo nero, backlight off
              auto call = id(backlight).turn_on();
              call.set_brightness(0.0);
              call.set_transition_length(500);
              call.perform();
              // Nascondi tutto
              lv_obj_add_flag(id(circle_detection), LV_OBJ_FLAG_HIDDEN);
              lv_obj_add_flag(id(circle_action), LV_OBJ_FLAG_HIDDEN);
              lv_obj_add_flag(id(arc_progress), LV_OBJ_FLAG_HIDDEN);
              lv_obj_add_flag(id(arc_pending), LV_OBJ_FLAG_HIDDEN);
              lv_obj_add_flag(id(lbl_step_number), LV_OBJ_FLAG_HIDDEN);
              lv_obj_add_flag(id(lbl_step_name), LV_OBJ_FLAG_HIDDEN);
              lv_obj_add_flag(id(lbl_device_name), LV_OBJ_FLAG_HIDDEN);
              lv_obj_add_flag(id(lbl_entity_icon), LV_OBJ_FLAG_HIDDEN);

            } else if (mode == "pending") {
              // Piccolo cerchio al centro — trigger time in corso
              auto call = id(backlight).turn_on();
              call.set_brightness(1.0);
              call.set_transition_length(0);
              call.perform();
              lv_obj_add_flag(id(circle_detection), LV_OBJ_FLAG_HIDDEN);
              lv_obj_add_flag(id(circle_action), LV_OBJ_FLAG_HIDDEN);
              lv_obj_add_flag(id(arc_progress), LV_OBJ_FLAG_HIDDEN);
              lv_obj_clear_flag(id(arc_pending), LV_OBJ_FLAG_HIDDEN);
              lv_arc_set_value(id(arc_pending), id(pending_progress_pct));
              lv_obj_add_flag(id(lbl_step_number), LV_OBJ_FLAG_HIDDEN);
              lv_obj_add_flag(id(lbl_step_name), LV_OBJ_FLAG_HIDDEN);
              lv_obj_add_flag(id(lbl_device_name), LV_OBJ_FLAG_HIDDEN);
              lv_obj_add_flag(id(lbl_entity_icon), LV_OBJ_FLAG_HIDDEN);

            } else if (mode == "detection") {
              // Backlight on istantanea, cerchio rosso + nome device
              auto call = id(backlight).turn_on();
              call.set_brightness(1.0);
              call.set_transition_length(0);
              call.perform();
              lv_obj_clear_flag(id(circle_detection), LV_OBJ_FLAG_HIDDEN);
              lv_obj_add_flag(id(circle_action), LV_OBJ_FLAG_HIDDEN);
              lv_obj_add_flag(id(arc_progress), LV_OBJ_FLAG_HIDDEN);
              lv_obj_add_flag(id(arc_pending), LV_OBJ_FLAG_HIDDEN);
              lv_obj_add_flag(id(lbl_step_number), LV_OBJ_FLAG_HIDDEN);
              lv_obj_add_flag(id(lbl_step_name), LV_OBJ_FLAG_HIDDEN);
              lv_obj_clear_flag(id(lbl_device_name), LV_OBJ_FLAG_HIDDEN);
              // Logo dell'entità target al centro del cerchio rosso
              lv_obj_clear_flag(id(lbl_entity_icon), LV_OBJ_FLAG_HIDDEN);

            } else if (mode == "selecting") {
              // Cerchio bianco + progress arc + nome device + logo entità.
              // Il numero del dispositivo va in ALTO A SINISTRA (non al centro).
              auto call = id(backlight).turn_on();
              call.set_brightness(1.0);
              call.set_transition_length(0);
              call.perform();
              lv_obj_add_flag(id(circle_detection), LV_OBJ_FLAG_HIDDEN);
              lv_obj_clear_flag(id(circle_action), LV_OBJ_FLAG_HIDDEN);
              lv_obj_clear_flag(id(arc_progress), LV_OBJ_FLAG_HIDDEN);
              lv_obj_add_flag(id(arc_pending), LV_OBJ_FLAG_HIDDEN);
              lv_obj_clear_flag(id(lbl_step_number), LV_OBJ_FLAG_HIDDEN);
              lv_obj_align(id(lbl_step_number), LV_ALIGN_TOP_LEFT, 14, 10);
              lv_obj_add_flag(id(lbl_step_name), LV_OBJ_FLAG_HIDDEN);
              lv_obj_clear_flag(id(lbl_device_name), LV_OBJ_FLAG_HIDDEN);
              lv_obj_clear_flag(id(lbl_entity_icon), LV_OBJ_FLAG_HIDDEN);
              // Reset animazione
              id(anim_start_ms) = millis();
              // Reset arco a 0
              lv_arc_set_value(id(arc_progress), 0);

            } else if (mode == "dimming") {
              // Dimming INVARIATO: numero al centro, nessun logo.
              auto call = id(backlight).turn_on();
              call.set_brightness(1.0);
              call.set_transition_length(0);
              call.perform();
              lv_obj_add_flag(id(circle_detection), LV_OBJ_FLAG_HIDDEN);
              lv_obj_clear_flag(id(circle_action), LV_OBJ_FLAG_HIDDEN);
              lv_obj_clear_flag(id(arc_progress), LV_OBJ_FLAG_HIDDEN);
              lv_obj_add_flag(id(arc_pending), LV_OBJ_FLAG_HIDDEN);
              lv_obj_clear_flag(id(lbl_step_number), LV_OBJ_FLAG_HIDDEN);
              lv_obj_align(id(lbl_step_number), LV_ALIGN_CENTER, 0, 0);
              lv_obj_add_flag(id(lbl_step_name), LV_OBJ_FLAG_HIDDEN);
              lv_obj_clear_flag(id(lbl_device_name), LV_OBJ_FLAG_HIDDEN);
              lv_obj_add_flag(id(lbl_entity_icon), LV_OBJ_FLAG_HIDDEN);
              // Reset animazione
              id(anim_start_ms) = millis();
              // Reset arco a 0
              lv_arc_set_value(id(arc_progress), 0);
            }

  - platform: homeassistant
    id: sensor_step
    entity_id: sensor.superhome_step
    on_value:
      then:
        - lambda: |-
            id(last_step_val) = x;
            lv_label_set_text(id(lbl_step_number), x.c_str());
            std::string mode = id(current_mode);
            if (mode == "dimming" || mode == "selecting") {
              id(anim_start_ms) = millis();
              lv_arc_set_value(id(arc_progress), 0);
            }

  - platform: homeassistant
    id: sensor_device_name
    entity_id: sensor.superhome_device_name
    on_value:
      then:
        - lambda: |-
            lv_label_set_text(id(lbl_device_name), x.c_str());

  - platform: homeassistant
    id: sensor_entity_icon
    entity_id: sensor.superhome_entity_icon
    on_value:
      then:
        - lambda: |-
            // Carattere glifo MDI dell'entità corrente ("" = nessun logo).
            lv_label_set_text(id(lbl_entity_icon), x.c_str());
            std::string m = id(current_mode);
            if (!x.empty() && (m == "detection" || m == "selecting")) {
              lv_obj_clear_flag(id(lbl_entity_icon), LV_OBJ_FLAG_HIDDEN);
            } else {
              lv_obj_add_flag(id(lbl_entity_icon), LV_OBJ_FLAG_HIDDEN);
            }

sensor:
  - platform: homeassistant
    id: sensor_time_step
    entity_id: sensor.superhome_time_step
    on_value:
      then:
        - lambda: |-
            id(time_step_s) = x;

  - platform: homeassistant
    id: sensor_pending_progress
    entity_id: sensor.superhome_pending_progress
    on_value:
      then:
        - lambda: |-
            int pct = (int)x;
            if (pct < 0) pct = 0;
            if (pct > 100) pct = 100;
            id(pending_progress_pct) = pct;
            // Aggiorna l'arco solo se siamo in pending
            if (id(current_mode) == "pending") {
              lv_arc_set_value(id(arc_pending), pct);
            }

# ── Hardware ─────────────────────────────────────────────────────────────────

spi:
  - type: quad
    clk_pin: 47
    data_pins: [21, 48, 40, 39]

i2c:
  - sda: 4
    scl: 8

output:
  - id: gpio_backlight_pwm
    platform: ledc
    pin: 1

light:
  - id: backlight
    name: Backlight
    platform: monochromatic
    output: gpio_backlight_pwm
    restore_mode: RESTORE_AND_OFF
    default_transition_length: 0ms

display:
  - id: main_display
    platform: mipi_spi
    model: JC3248W535
    data_rate: 40MHz
    update_interval: never
    auto_clear_enabled: false

touchscreen:
  - id: main_touchscreen
    platform: axs15231

# ── Interval: aggiorna progress arc ──────────────────────────────────────────

interval:
  - interval: 50ms
    then:
      - lambda: |-
          std::string mode = id(current_mode);
          if (mode != "dimming" && mode != "selecting") return;

          float elapsed = (millis() - id(anim_start_ms)) / 1000.0f;
          float ts = id(time_step_s);
          if (ts <= 0) ts = 1.0f;

          float pct = elapsed / ts;
          if (pct > 1.0f) pct = 1.0f;

          // lv_arc range 0-100
          int arc_val = (int)(pct * 100.0f);
          lv_arc_set_value(id(arc_progress), arc_val);

# ── Font icone MDI ─────────────────────────────────────────────────────────────
